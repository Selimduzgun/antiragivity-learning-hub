<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AntiRagivity Knowledge Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{--bg:#07091a;--bg2:#0e1330;--bg3:rgba(20,28,60,.6);--txt:#f0f2ff;--txt2:#8896b7;--accent:#818cf8;--accent2:#c084fc;--border:rgba(129,140,248,.15);--card:rgba(25,35,65,.5)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:2rem 1.25rem;gap:.5rem;overflow-y:auto}
.logo{display:flex;align-items:center;gap:.75rem;font-size:1.4rem;font-weight:800;background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2rem;padding:0 .25rem}
.logo svg{flex-shrink:0;width:28px;height:28px;stroke:url(#lg);stroke-width:2;fill:none}
.nav-item{display:flex;align-items:center;gap:.85rem;padding:.8rem 1rem;border-radius:.75rem;color:var(--txt2);font-weight:500;font-size:.92rem;cursor:pointer;transition:all .25s}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-item:hover{background:rgba(129,140,248,.1);color:var(--txt)}
.nav-item.active{background:rgba(129,140,248,.12);color:var(--txt)}
.nav-item.active{position:relative}
.nav-item.active::before{content:'';position:absolute;left:0;top:25%;height:50%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.sidebar-section{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin:1.25rem 0 .5rem .25rem;opacity:.6}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:2.5rem 3rem}
/* PAGE */
.page{max-width:1300px;margin:0 auto;animation:fadeUp .4s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
/* HERO */
.hero{position:relative;background:var(--bg3);border:1px solid var(--border);border-radius:1.5rem;padding:4rem 3.5rem;margin-bottom:2.5rem;overflow:hidden;backdrop-filter:blur(20px)}
.hero::before{content:'';position:absolute;right:-80px;top:-80px;width:350px;height:350px;background:radial-gradient(circle,rgba(129,140,248,.18) 0%,transparent 70%);border-radius:50%}
.hero::after{content:'';position:absolute;left:40%;bottom:-100px;width:250px;height:250px;background:radial-gradient(circle,rgba(192,132,252,.12) 0%,transparent 70%);border-radius:50%}
.badge{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .9rem;background:rgba(129,140,248,.12);color:var(--accent);border:1px solid rgba(129,140,248,.25);border-radius:2rem;font-size:.78rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:1.5rem}
.hero h1{font-size:3.2rem;font-weight:800;line-height:1.1;margin-bottom:1.25rem}
.grad{background:linear-gradient(120deg,var(--accent),var(--accent2),#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.05rem;color:var(--txt2);max-width:560px;margin-bottom:2.5rem;line-height:1.7}
.btn-row{display:flex;gap:1rem;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.8rem 1.6rem;border-radius:.75rem;font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer;border:none;transition:all .25s}
.btn-primary{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;box-shadow:0 4px 15px rgba(99,102,241,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,102,241,.5)}
.btn-outline{background:rgba(255,255,255,.05);color:var(--txt);border:1px solid var(--border)}
.btn-outline:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem;margin-bottom:3rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:1.75rem 2rem;display:flex;align-items:center;gap:1.5rem;transition:all .3s;backdrop-filter:blur(12px)}
.stat-card:hover{transform:translateY(-5px);border-color:rgba(129,140,248,.35);box-shadow:0 12px 30px rgba(0,0,0,.3)}
.stat-icon{width:3rem;height:3rem;border-radius:.875rem;background:rgba(129,140,248,.1);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon svg{width:22px;height:22px}
.stat-num{font-size:1.8rem;font-weight:700;line-height:1}
.stat-label{font-size:.8rem;color:var(--txt2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:.3rem}
/* SECTION HEADER */
.sec-header{margin-bottom:2rem}
.sec-header h2{font-size:1.75rem;font-weight:700;margin-bottom:.4rem}
.sec-header p{color:var(--txt2);font-size:.95rem}
/* FILTER BAR */
.filter-bar{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2.25rem}
.filter-btn{padding:.5rem 1.1rem;border-radius:2rem;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--txt2);font-family:inherit;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:rgba(129,140,248,.4);color:var(--txt)}
.filter-btn.active{background:rgba(129,140,248,.12);border-color:rgba(129,140,248,.4);color:var(--accent)}
/* CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:1.75rem}
.k-card{background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:1.75rem;display:flex;flex-direction:column;cursor:pointer;transition:all .35s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;backdrop-filter:blur(12px)}
.k-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .3s}
.k-card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(0,0,0,.35);border-color:rgba(129,140,248,.3)}
.k-card:hover::before{opacity:1}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem}
.cat-tag{background:rgba(129,140,248,.12);color:var(--accent);padding:.28rem .75rem;border-radius:2rem;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.type-tag{color:var(--txt2);font-size:.78rem;font-weight:500}
.k-card h3{font-size:1.15rem;font-weight:700;margin-bottom:.85rem;line-height:1.35}
.k-card p{color:var(--txt2);font-size:.9rem;line-height:1.65;flex:1;margin-bottom:1.25rem}
.card-bottom{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:1.1rem;margin-top:auto}
.author{color:var(--txt2);font-size:.82rem;display:flex;align-items:center;gap:.4rem}
.explore-btn{color:var(--accent);font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:.35rem;transition:gap .2s}
.k-card:hover .explore-btn{gap:.6rem}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:2rem;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);width:100%;max-width:780px;max-height:88vh;border-radius:1.5rem;border:1px solid var(--border);box-shadow:0 30px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;overflow:hidden;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.modal-head{padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg);position:relative}
.modal-close{position:absolute;top:1.5rem;right:1.5rem;background:rgba(255,255,255,.06);border:none;color:var(--txt2);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.modal-close:hover{background:rgba(255,255,255,.12);color:var(--txt)}
.modal-close svg{width:18px;height:18px}
.modal-head .badge{margin-bottom:.85rem}
.modal-head h2{font-size:1.65rem;font-weight:700;margin-bottom:.5rem}
.modal-head p{color:var(--txt2);font-size:.92rem;line-height:1.6}
.modal-body{padding:2rem;overflow-y:auto;flex:1}
.item-list{display:flex;flex-direction:column;gap:.9rem}
.item-row{background:rgba(129,140,248,.05);border:1px solid rgba(129,140,248,.1);border-radius:1rem;padding:1.1rem 1.25rem;transition:all .2s;counter-increment:items}
.item-row:hover{background:rgba(129,140,248,.09);border-color:rgba(129,140,248,.25);transform:translateX(4px)}
.item-row h4{color:var(--accent);font-size:.92rem;font-weight:700;margin-bottom:.35rem}
.item-row p{color:var(--txt);font-size:.92rem;line-height:1.6}
/* CATEGORIES PAGE */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.25rem}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:1rem;cursor:pointer;transition:all .3s}
.cat-card:hover{transform:translateY(-5px);border-color:rgba(129,140,248,.35)}
.cat-icon{font-size:2.5rem}
.cat-card h3{font-size:1rem;font-weight:700}
.cat-card p{color:var(--txt2);font-size:.82rem}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(129,140,248,.25);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(129,140,248,.45)}
/* SEARCH */
.search-wrap{position:relative;margin-bottom:2rem}
.search-wrap input{width:100%;padding:1rem 1.25rem 1rem 3rem;background:var(--card);border:1px solid var(--border);border-radius:1rem;color:var(--txt);font-family:inherit;font-size:.95rem;outline:none;transition:border-color .2s;backdrop-filter:blur(12px)}
.search-wrap input:focus{border-color:rgba(129,140,248,.5)}
.search-wrap svg{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--txt2);width:18px;height:18px}
/* OHI / Case Stats */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.25rem;margin-bottom:2rem}
.kpi-box{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem;text-align:center;backdrop-filter:blur(12px)}
.kpi-box .num{font-size:2rem;font-weight:800;background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi-box .desc{color:var(--txt2);font-size:.8rem;margin-top:.4rem}
</style>
</head>

const CATS = [
  {icon:"🎯",name:"Kariyer",desc:"Networking, terfi, kariyer geliştirme",count:2},
  {icon:"👑",name:"HR / Liderlik",desc:"Elde tutma, yönetim, liderlik",count:2},
  {icon:"🤖",name:"AI",desc:"Yapay zeka araçları ve agent geliştirme",count:3},
  {icon:"🏢",name:"Kültür",desc:"Kültür dönüşümü ve organizasyon",count:1},
  {icon:"📊",name:"HR",desc:"HR stratejisi, ROI, 2026 öncelikleri",count:2},
  {icon:"🎓",name:"Koçluk",desc:"Koçluk soruları ve teknikler",count:1},
  {icon:"📈",name:"Strateji",desc:"Değişim yönetimi ve iş stratejisi",count:1},
  {icon:"💡",name:"Kişisel Gelişim",desc:"Alışkanlıklar ve öz-ustalık",count:1},
  {icon:"🔬",name:"Vaka Çalışması",desc:"Gerçek kurumsal projeler",count:1},
];

// ─── RENDERING ──────────────────────────────────────
let currentFilter = 'all';
let searchQ = '';

function icon(path,size=18){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
}

function renderDashboard(){
  return `<div class="page">
    <div class="hero">
      <div class="badge">✦ AntiRagivity Knowledge Hub v2.0</div>
      <h1>Kariyer ve Şirket<br>Uzmanlığında<br><span class="grad">Yeni Nesil Öğrenme</span></h1>
      <p>Liderlik, HR, Yapay Zeka ve Kültürel Dönüşüm konularında McKinsey, LinkedIn, AIHR, Mercer gibi kaynaklardan derlenen 830+ dosyadan oluşan interaktif bilgi merkezi.</p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="showPage('library')">
          ${icon('<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>',20)} Kütüphaneye Git
        </button>
        <button class="btn btn-outline" onclick="showPage('categories')">
          ${icon('<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>',20)} Kategoriler
        </button>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-box"><div class="num">830+</div><div class="desc">Toplam İşlenen Dosya</div></div>
      <div class="kpi-box"><div class="num">727</div><div class="desc">Görsel Framework</div></div>
      <div class="kpi-box"><div class="num">9</div><div class="desc">İçerik Kategorisi</div></div>
      <div class="kpi-box"><div class="num">6x</div><div class="desc">Dönüşüm Başarı Çarpanı</div></div>
    </div>

    <div class="sec-header"><h2>Öne Çıkan İçerikler</h2><p>Kütüphanenin en çok kullanılan içerikleri.</p></div>
    <div class="cards-grid">
      ${KB.slice(0,6).map(k=>cardHTML(k)).join('')}
    </div>
  </div>`;
}

function renderLibrary(){
  const cats = ['all', ...new Set(KB.map(k=>k.cat))];
  const filtered = KB.filter(k=>{
    const matchCat = currentFilter==='all' || k.cat===currentFilter;
    const matchQ = !searchQ || k.title.toLowerCase().includes(searchQ) || k.summary.toLowerCase().includes(searchQ) || k.cat.toLowerCase().includes(searchQ);
    return matchCat && matchQ;
  });

  return `<div class="page">
    <div class="sec-header"><h2>Bilgi Kütüphanesi</h2><p>${KB.length} içerik · Keşfet, filtrele, derinleş.</p></div>

    <div class="search-wrap">
      ${icon('<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>')}
      <input type="text" placeholder="İçerik, konu veya yazar ara..." id="search-input" value="${searchQ}" oninput="handleSearch(this.value)">
    </div>

    <div class="filter-bar">
      ${cats.map(c=>`<button class="filter-btn ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c==='all'?'Tümü':c}</button>`).join('')}
    </div>

    <div class="cards-grid" id="cards-container">
      ${filtered.length ? filtered.map(k=>cardHTML(k)).join('') : '<p style="color:var(--txt2);grid-column:1/-1;text-align:center;padding:3rem">Arama sonucu bulunamadı.</p>'}
    </div>
  </div>`;
}

function renderCategories(){
  return `<div class="page">
    <div class="sec-header"><h2>Kategoriler</h2><p>Konuya göre keşfet.</p></div>
    <div class="cat-grid">
      ${CATS.map(c=>`
        <div class="cat-card" onclick="setFilter('${c.name}');showPage('library')">
          <div class="cat-icon">${c.icon}</div>
          <h3>${c.name}</h3>
          <p>${c.desc}</p>
          <span style="color:var(--accent);font-weight:700;font-size:.85rem">${c.count} içerik</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderCaseStudies(){
  const cases = KB.filter(k=>k.cat==='Vaka Çalışması');
  return `<div class="page">
    <div class="sec-header"><h2>Vaka Çalışmaları</h2><p>Gerçek kurumsal dönüşüm projeleri.</p></div>

    <div style="background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:2.5rem;margin-bottom:2rem;backdrop-filter:blur(12px)">
      <div class="badge" style="margin-bottom:1rem">beIN Media Group / Digiturk</div>
      <h3 style="font-size:1.5rem;margin-bottom:1rem">McKinsey Destekli Kültür Dönüşümü (2024-2025)</h3>
      <div class="kpi-row" style="margin-bottom:1.5rem">
        <div class="kpi-box"><div class="num">3x</div><div class="desc">Hisse Performansı</div></div>
        <div class="kpi-box"><div class="num">%18</div><div class="desc">EBITA Artışı (1 yılda)</div></div>
        <div class="kpi-box"><div class="num">%50</div><div class="desc">Performans Varyasyonu</div></div>
        <div class="kpi-box"><div class="num">2.5x</div><div class="desc">ROIC Avantajı</div></div>
      </div>
      <p style="color:var(--txt2);line-height:1.7">beIN/Digiturk için 14 yönetici ve 110+ çalışanla yürütülen focus group çalışmasından doğan iki kültürel direk: <strong style="color:var(--accent)">beINcares</strong> (özenli liderlik) ve <strong style="color:var(--accent2)">beINcharge</strong> (sahiplik + inisiyatif).</p>
    </div>

    <div class="cards-grid">
      ${cases.map(k=>cardHTML(k)).join('')}
    </div>
  </div>`;
}

function cardHTML(k){
  return `<div class="k-card" onclick="openModal('${k.id}')">
    <div class="card-top">
      <span class="cat-tag">${k.cat}</span>
      <span class="type-tag">${k.type}</span>
    </div>
    <h3>${k.title}</h3>
    <p>${k.summary}</p>
    <div class="card-bottom">
      <span class="author">${icon('<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',14)} ${k.author||'Internal'}</span>
      <span class="explore-btn">Keşfet ${icon('<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',16)}</span>
    </div>
  </div>`;
}

function openModal(id){
  const k = KB.find(x=>x.id===id);
  if(!k) return;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <button class="modal-close" onclick="this.closest('.overlay').remove()">
          ${icon('<path d="M18 6 6 18"/><path d="m6 6 12 12"/>')}
        </button>
        <div class="badge">${k.cat} · ${k.type}</div>
        <h2>${k.title}</h2>
        <p>${k.summary}</p>
      </div>
      <div class="modal-body">
        <ul class="item-list">
          ${k.items.map(it=>`<li class="item-row">${it.t?`<h4>${it.t}</h4>`:''}${it.d?`<p>${it.d}</p>`:''}</li>`).join('')}
        </ul>
      </div>
    </div>`;
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ─── NAV ─────────────────────────────────────────────
const pages = {dashboard:renderDashboard,library:renderLibrary,categories:renderCategories,casestudies:renderCaseStudies};
let currentPage = 'dashboard';

function showPage(name, clickedEl){
  currentPage = name;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  if(clickedEl) clickedEl.classList.add('active');
  else{
    const all = document.querySelectorAll('.nav-item');
    const idx = {dashboard:0,library:1,categories:2,casestudies:3};
    if(idx[name]!==undefined) all[idx[name]]?.classList.add('active');
  }
  document.getElementById('main-area').innerHTML = pages[name]();
}

function setFilter(f){
  currentFilter = f;
  if(currentPage==='library') document.getElementById('main-area').innerHTML = renderLibrary();
}

function handleSearch(q){
  searchQ = q.toLowerCase();
  document.getElementById('cards-container').innerHTML = (() => {
    const filtered = KB.filter(k=>{
      const matchCat = currentFilter==='all' || k.cat===currentFilter;
      const matchQ = !searchQ || k.title.toLowerCase().includes(searchQ) || k.summary.toLowerCase().includes(searchQ) || k.cat.toLowerCase().includes(searchQ);
      return matchCat && matchQ;
    });
    return filtered.length ? filtered.map(k=>cardHTML(k)).join('') : '<p style="color:var(--txt2);grid-column:1/-1;text-align:center;padding:3rem">Sonuç bulunamadı.</p>';
  })();
}

// ─── INIT ─────────────────────────────────────────────
document.getElementById('main-area').innerHTML = renderDashboard();
</script>
</body>
